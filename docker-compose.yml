version: '3.9'

services:
  # Management PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: dbprovision
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (job queue)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MGMT_DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dbprovision
      MGMT_DB_SYNC_URL: postgresql://postgres:postgres@postgres:5432/dbprovision
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./infrastructure:/infrastructure
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery workers (separate queues)
  worker-provisioning:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker -Q provisioning -c 4 --loglevel=info
    environment:
      MGMT_DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dbprovision
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  worker-migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker -Q migrations -c 10 --loglevel=info
    environment:
      MGMT_DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dbprovision
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  worker-backups:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker -Q backups -c 2 --loglevel=info
    depends_on:
      - postgres
      - redis

  # Celery Beat (scheduler for automated backups)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    depends_on:
      - redis

  # Next.js frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  # Grafana
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards

volumes:
  postgres_data:
  grafana_data: