# Custom SQL queries exposed as Prometheus metrics.
# postgres_exporter runs these on a schedule and exposes results at :9187/metrics.
# This gives you metrics that the standard exporter doesn't have out of the box.

pg_slow_queries:
  query: |
    SELECT
      LEFT(query, 100)                                  AS query_snippet,
      calls,
      round((total_exec_time / calls)::numeric, 2)      AS avg_exec_time_ms,
      round(total_exec_time::numeric, 2)                AS total_exec_time_ms,
      rows
    FROM pg_stat_statements
    WHERE calls > 10
      AND (total_exec_time / calls) > 1000
    ORDER BY avg_exec_time_ms DESC
    LIMIT 20
  metrics:
    - query_snippet:
        usage: LABEL
        description: First 100 chars of the query
    - calls:
        usage: COUNTER
        description: Number of times this query was called
    - avg_exec_time_ms:
        usage: GAUGE
        description: Average execution time in milliseconds
    - total_exec_time_ms:
        usage: COUNTER
        description: Total time spent on this query
    - rows:
        usage: COUNTER
        description: Total rows returned

pg_table_bloat:
  query: |
    SELECT
      schemaname,
      tablename,
      pg_size_pretty(pg_total_relation_size(schemaname||'.'||tablename)) AS total_size,
      pg_total_relation_size(schemaname||'.'||tablename)                 AS total_size_bytes,
      n_dead_tup,
      n_live_tup,
      CASE WHEN n_live_tup > 0
           THEN round(100.0 * n_dead_tup / n_live_tup, 2)
           ELSE 0 END                                                    AS dead_tuple_pct
    FROM pg_stat_user_tables
    WHERE n_live_tup > 1000
    ORDER BY n_dead_tup DESC
    LIMIT 20
  metrics:
    - schemaname:
        usage: LABEL
        description: Schema name
    - tablename:
        usage: LABEL
        description: Table name
    - total_size_bytes:
        usage: GAUGE
        description: Total table size in bytes including indexes
    - n_dead_tup:
        usage: GAUGE
        description: Estimated number of dead tuples (needs VACUUM)
    - n_live_tup:
        usage: GAUGE
        description: Estimated number of live tuples
    - dead_tuple_pct:
        usage: GAUGE
        description: Percentage of dead vs live tuples — high value means VACUUM needed

pg_index_usage:
  query: |
    SELECT
      schemaname,
      tablename,
      indexname,
      idx_scan,
      idx_tup_read,
      idx_tup_fetch,
      pg_size_pretty(pg_relation_size(indexrelid)) AS index_size
    FROM pg_stat_user_indexes
    ORDER BY idx_scan ASC
    LIMIT 30
  metrics:
    - schemaname:
        usage: LABEL
        description: Schema name
    - tablename:
        usage: LABEL
        description: Table name
    - indexname:
        usage: LABEL
        description: Index name
    - idx_scan:
        usage: COUNTER
        description: Number of index scans — low means unused index wasting space
    - idx_tup_read:
        usage: COUNTER
        description: Number of index entries read
    - idx_tup_fetch:
        usage: COUNTER
        description: Number of live rows fetched via index

pg_long_running_queries:
  query: |
    SELECT
      pid,
      usename,
      state,
      EXTRACT(EPOCH FROM (NOW() - query_start)) AS duration_seconds,
      LEFT(query, 200)                          AS query_snippet,
      wait_event_type,
      wait_event
    FROM pg_stat_activity
    WHERE state != 'idle'
      AND query_start < NOW() - INTERVAL '30 seconds'
      AND query NOT LIKE '%pg_stat_activity%'
    ORDER BY duration_seconds DESC
    LIMIT 10
  metrics:
    - pid:
        usage: LABEL
        description: Process ID
    - usename:
        usage: LABEL
        description: Database user
    - state:
        usage: LABEL
        description: Query state (active, idle in transaction)
    - duration_seconds:
        usage: GAUGE
        description: How long this query has been running
    - wait_event_type:
        usage: LABEL
        description: What this query is waiting for (Lock, IO, etc.)